<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, dark-themed to-do list application to organize your tasks efficiently. Built with HTML5, CSS3, and Vanilla JavaScript." />
  <meta name="theme-color" content="#0F172A" />
  <title>TaskFlow — Modern To-Do List App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">✓</span>
        <h1 class="brand-title">TaskFlow</h1>
      </div>
      <p class="brand-subtitle">Stay focused. Stay organized.</p>
    </div>
  </header>

  <main id="main-content" class="app-main">
    <section class="task-input-section" aria-labelledby="add-task-heading">
      <h2 id="add-task-heading" class="visually-hidden">Add a new task</h2>
      <form id="task-form" class="task-form" autocomplete="off">
        <div class="input-wrapper">
          <label for="task-input" class="visually-hidden">Task description</label>
          <input
            type="text"
            id="task-input"
            name="task-input"
            class="task-input"
            placeholder="What needs to be done?"
            maxlength="200"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary" id="add-btn">
          <span class="btn-icon" aria-hidden="true">+</span>
          <span>Add Task</span>
        </button>
      </form>
    </section>

    <section class="filters-section" aria-labelledby="filters-heading">
      <h2 id="filters-heading" class="visually-hidden">Filter tasks</h2>
      <div class="filters-wrapper">
        <div class="filter-buttons" role="group" aria-label="Task filters">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button type="button" class="btn btn-danger-ghost" id="clear-completed-btn">
          Clear Completed
        </button>
      </div>
    </section>

    <section class="task-list-section" aria-labelledby="task-list-heading">
      <h2 id="task-list-heading" class="visually-hidden">Your tasks</h2>

      <ul class="task-list" id="task-list" aria-live="polite"></ul>

      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon" aria-hidden="true">📝</div>
        <p class="empty-state-title">No tasks yet</p>
        <p class="empty-state-subtitle">Add a task above to get started</p>
      </div>
    </section>

    <section class="counter-section" aria-live="polite">
      <p class="task-counter" id="task-counter">0 tasks left</p>
    </section>
  </main>

  <footer class="app-footer">
    <p>&copy; <span id="current-year"></span> TaskFlow. Built with HTML, CSS &amp; JavaScript.</p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
