            id="name"
            name="name"
            type="text"
            placeholder="Your Name"
            required
          /><br /><br />

          <input
            id="mail"
            name="mail"
            type="email"
            placeholder="user@mail.com"
            required

          <input
            id="subject"
            name="subject"
            type="text"
            placeholder="Hiring"
            required
          />
          <br /><br />
          <label for="message">Message: </label>
          <textarea
            id="message"
            rows="5"
            cols="30"
            name="message"
            placeholder="Hi! Let's connect"
            required
          ></textarea
          ><br /><br />
          <button type="submit">Send Message</button>
